[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nexus-ledger"
version = "1.0.0"
description = "Signed activity ledger and capability discovery for AI agents"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "aiohttp>=3.9.0",
  "pynacl>=1.5.0",
]

[project.optional-dependencies]
solana = [
  "solders>=0.21.0",
  "solana>=0.35.0",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
